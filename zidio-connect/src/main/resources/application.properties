# Import local environment variables if available
spring.config.import=optional:classpath:application-secrets.properties

# ── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}

# ── CRITICAL: Lazy initialization ───────────────────────────
# This makes Tomcat bind the port BEFORE JPA/beans initialize
# Fixes Render "port scan timeout" — app now responds within 2-3s
spring.main.lazy-initialization=true

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/zidio_connect}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Skip JPA open-in-view (reduces startup work)
spring.jpa.open-in-view=false

# Connection pool — smaller pool = faster startup on free tier
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.initialization-fail-timeout=-1

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expirationMs=86400000

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
